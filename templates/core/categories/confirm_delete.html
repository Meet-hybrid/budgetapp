{% extends "base.html" %}
{% block title %}Delete Category{% endblock %}
{% block header %}<div class="page-title">Delete Category</div>{% endblock %}
{% block content %}
<div style="max-width:480px;">
  <div class="card">
    <div style="font-size:48px;text-align:center;margin-bottom:16px;">{{ category.icon }}</div>
    <h3 style="text-align:center;margin-bottom:8px;">Delete "{{ category.name }}"?</h3>
    <p class="text-muted text-sm" style="text-align:center;margin-bottom:24px;">Transactions in this category will become uncategorized.</p>
    <form method="post">
      {% csrf_token %}
      <div class="flex gap-2" style="justify-content:center;">
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'category_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
