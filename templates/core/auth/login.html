{% extends "base.html" %}
{% block auth_content %}
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); }
.auth-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 8px; }
.auth-subtitle { text-align: center; color: var(--text3); font-size: 14px; margin-bottom: 32px; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text3); }
.auth-footer a { color: var(--accent); font-weight: 600; }
.btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }
</style>
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;">&#128176;</div>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to your BudgetWise account</div>
    {% if form.errors %}
      <div class="alert alert-error">Invalid username or password. Please try again.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <div class="auth-footer">
      Do not have an account? <a href="{% url 'register' %}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
